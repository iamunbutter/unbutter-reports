<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>언버터 리포트 | 프로젝트 아카이브 v2</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #1f2937;
    }

    .header {
      background: linear-gradient(135deg, #fff9e6 0%, #fff1b5 100%);
      border-bottom: 3px solid #43302e;
      padding: 2rem;
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 2.5rem;
      color: #43302e;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .version-badge {
      font-size: 0.75rem;
      background: #43302e;
      color: #fff1b5;
      padding: 0.25rem 0.75rem;
      border-radius: 1rem;
      font-weight: bold;
    }

    .total-count {
      font-size: 3rem;
      font-weight: bold;
      color: #43302e;
    }

    .total-label {
      font-size: 1rem;
      color: #6b7280;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .category-card {
      background: white;
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: all 0.3s;
      border-left: 4px solid;
    }

    .category-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .category-card.active {
      box-shadow: 0 4px 16px rgba(67, 48, 46, 0.3);
      transform: translateY(-2px);
    }

    .category-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .category-name {
      font-size: 1.125rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .category-count {
      font-size: 2rem;
      font-weight: bold;
    }

    .documents {
      background: white;
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .documents-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #f3f4f6;
    }

    .documents-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: #43302e;
    }

    .search-box {
      padding: 0.5rem 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 0.5rem;
      font-size: 1rem;
      width: 300px;
    }

    .search-box:focus {
      outline: none;
      border-color: #fff1b5;
    }

    .doc-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .doc-item {
      border-left: 4px solid;
      padding: 1.5rem;
      background: #f9fafb;
      border-radius: 0.5rem;
      transition: all 0.3s;
      cursor: pointer;
    }

    .doc-item:hover {
      background: #f3f4f6;
      transform: translateX(4px);
    }

    .doc-title {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #1f2937;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .doc-meta {
      display: flex;
      gap: 1.5rem;
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 0.75rem;
    }

    .doc-meta span {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .doc-desc {
      color: #4b5563;
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    .doc-link {
      display: inline-block;
      margin-top: 0.75rem;
      color: #43302e;
      font-weight: 600;
      text-decoration: none;
      font-size: 0.875rem;
    }

    .doc-link:hover {
      text-decoration: underline;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #9ca3af;
    }

    .empty-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .loading-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #6b7280;
    }

    /* 모달 스타일 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      animation: fadeIn 0.2s;
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .modal-content {
      background: white;
      border-radius: 1rem;
      max-width: 900px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.3s;
    }

    .modal-header {
      padding: 1.5rem 2rem;
      border-bottom: 2px solid #f3f4f6;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: #43302e;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.5rem;
      color: #6b7280;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: #43302e;
    }

    .modal-body {
      padding: 2rem;
      overflow-y: auto;
      flex: 1;
    }

    .modal-loading {
      text-align: center;
      padding: 4rem 2rem;
      color: #6b7280;
    }

    .modal-error {
      text-align: center;
      padding: 4rem 2rem;
      color: #dc2626;
    }

    /* Markdown 렌더링 스타일 */
    .markdown-content {
      line-height: 1.8;
      color: #1f2937;
    }

    .markdown-content h1 {
      font-size: 2rem;
      margin-top: 2rem;
      margin-bottom: 1rem;
      color: #43302e;
      border-bottom: 2px solid #fff1b5;
      padding-bottom: 0.5rem;
    }

    .markdown-content h2 {
      font-size: 1.5rem;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      color: #43302e;
    }

    .markdown-content h3 {
      font-size: 1.25rem;
      margin-top: 1.25rem;
      margin-bottom: 0.5rem;
      color: #43302e;
    }

    .markdown-content p {
      margin-bottom: 1rem;
    }

    .markdown-content ul, .markdown-content ol {
      margin-left: 2rem;
      margin-bottom: 1rem;
    }

    .markdown-content li {
      margin-bottom: 0.5rem;
    }

    .markdown-content code {
      background: #f3f4f6;
      padding: 0.2rem 0.4rem;
      border-radius: 0.25rem;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 0.875em;
    }

    .markdown-content pre {
      background: #1f2937;
      color: #f9fafb;
      padding: 1rem;
      border-radius: 0.5rem;
      overflow-x: auto;
      margin-bottom: 1rem;
    }

    .markdown-content pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    .markdown-content blockquote {
      border-left: 4px solid #fff1b5;
      padding-left: 1rem;
      margin-left: 0;
      margin-bottom: 1rem;
      color: #6b7280;
    }

    .markdown-content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1rem;
    }

    .markdown-content th,
    .markdown-content td {
      padding: 0.75rem;
      border: 1px solid #e5e7eb;
      text-align: left;
    }

    .markdown-content th {
      background: #f9fafb;
      font-weight: 600;
    }

    .markdown-content hr {
      border: none;
      border-top: 2px solid #f3f4f6;
      margin: 1.5rem 0;
    }

    .markdown-content strong {
      color: #43302e;
    }

    @media (max-width: 768px) {
      h1 { font-size: 1.5rem; }
      .total-count { font-size: 2rem; }
      .categories { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; }
      .category-card { padding: 1rem; }
      .search-box { width: 100%; }
      .documents-header { flex-direction: column; gap: 1rem; }
      .modal.active { padding: 0.5rem; }
      .modal-content { max-height: 95vh; }
      .modal-body { padding: 1rem; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <h1>
        언버터 리포트
        <span class="version-badge">v2.0</span>
      </h1>
      <div style="text-align: right;">
        <div class="total-count" id="totalCount">-</div>
        <div class="total-label">전체 문서</div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="categories" id="categories"></div>

    <div class="documents">
      <div class="documents-header">
        <div class="documents-title" id="categoryTitle">전체 문서</div>
        <input type="text" class="search-box" id="searchBox" placeholder="문서 검색...">
      </div>
      <div class="doc-list" id="docList">
        <div class="loading-state">문서를 불러오는 중...</div>
      </div>
    </div>
  </div>

  <!-- 문서 보기 모달 -->
  <div class="modal" id="docModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">문서</div>
        <button class="modal-close" onclick="closeModal()">&#x2715;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    // docs.json에서 로드한 데이터
    let docsData = {};
    let categories = [];
    let documents = [];
    let currentCategory = 'all';

    // docs.json 로드 후 초기화
    async function init() {
      try {
        const response = await fetch('./docs.json');
        if (!response.ok) throw new Error('docs.json 로드 실패');
        docsData = await response.json();

        buildDataFromJson();
        renderCategories();
        renderDocuments(documents);
        document.getElementById('totalCount').textContent = documents.length;
      } catch (err) {
        console.error(err);
        document.getElementById('docList').innerHTML = '<div class="empty-state"><div class="empty-icon">&#x26A0;</div><div>문서 데이터를 불러올 수 없습니다</div></div>';
      }
    }

    function buildDataFromJson() {
      const catConfig = docsData.categories || {};
      const docs = docsData.documents || {};

      // 카테고리별 문서 수 집계
      const catCounts = {};
      Object.values(docs).forEach(doc => {
        catCounts[doc.category] = (catCounts[doc.category] || 0) + 1;
      });

      // 카테고리 목록 생성
      categories = [
        { id: 'all', name: '전체', icon: '', count: Object.keys(docs).length, color: '#9ca3af' }
      ];

      Object.entries(catConfig).forEach(([id, cfg]) => {
        if (catCounts[id]) {
          categories.push({
            id,
            name: cfg.name,
            icon: cfg.icon,
            count: catCounts[id],
            color: cfg.color
          });
        }
      });

      // 문서 목록 생성
      documents = Object.entries(docs).map(([key, doc], index) => {
        return {
          id: index,
          key: key,
          category: doc.category,
          title: doc.title || key.split('/').pop().replace('.md', ''),
          description: doc.description || '',
          size: doc.size || 0,
          path: doc.path
        };
      });

      // 제목순 정렬
      documents.sort((a, b) => a.title.localeCompare(b.title, 'ko'));
    }

    function renderCategories() {
      const container = document.getElementById('categories');
      container.innerHTML = categories.map(cat => `
        <div class="category-card ${cat.id === currentCategory ? 'active' : ''}"
             style="border-left-color: ${cat.color}"
             onclick="filterByCategory('${cat.id}')">
          <div class="category-header">
            <div class="category-name">${cat.icon} ${cat.name}</div>
            <div class="category-count" style="color: ${cat.color}">${cat.count}</div>
          </div>
        </div>
      `).join('');
    }

    function renderDocuments(docs) {
      const container = document.getElementById('docList');

      if (docs.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon"></div><div>문서가 없습니다</div></div>';
        return;
      }

      container.innerHTML = docs.map(doc => {
        const cat = categories.find(c => c.id === doc.category) || { icon: '', color: '#9ca3af', name: doc.category };
        const sizeKB = (doc.size / 1024).toFixed(1);
        return `
          <div class="doc-item" style="border-left-color: ${cat.color}" onclick="openDoc(${doc.id})">
            <div class="doc-title">${cat.icon} ${doc.title}</div>
            <div class="doc-meta">
              <span>${cat.name}</span>
              <span>${sizeKB} KB</span>
            </div>
            <div class="doc-desc">${doc.description}</div>
            <a href="#" class="doc-link" onclick="event.stopPropagation(); openDoc(${doc.id}); return false;">문서 보기 &rarr;</a>
          </div>
        `;
      }).join('');
    }

    function filterByCategory(catId) {
      currentCategory = catId;

      let filtered;
      if (catId === 'all') {
        filtered = documents;
      } else {
        filtered = documents.filter(doc => doc.category === catId);
      }

      const cat = categories.find(c => c.id === catId);
      document.getElementById('categoryTitle').textContent = cat ? cat.name : '전체 문서';

      renderCategories();
      renderDocuments(filtered);
    }

    function searchDocuments(query) {
      const lowerQuery = query.toLowerCase();
      const results = documents.filter(doc => {
        if (currentCategory !== 'all' && doc.category !== currentCategory) return false;
        return doc.title.toLowerCase().includes(lowerQuery) ||
               doc.description.toLowerCase().includes(lowerQuery) ||
               doc.category.toLowerCase().includes(lowerQuery);
      });
      renderDocuments(results);
    }

    function openDoc(docId) {
      const doc = documents.find(d => d.id === docId);
      if (!doc) return;

      const modal = document.getElementById('docModal');
      const modalTitle = document.getElementById('modalTitle');
      const modalBody = document.getElementById('modalBody');

      const cat = categories.find(c => c.id === doc.category) || { icon: '' };
      modalTitle.innerHTML = `${cat.icon} ${doc.title}`;

      // docs.json에서 직접 콘텐츠 가져오기
      const docData = docsData.documents[doc.key];
      if (docData && docData.content) {
        const htmlContent = marked.parse(docData.content);
        modalBody.innerHTML = '<div class="markdown-content">' + htmlContent + '</div>';
      } else {
        modalBody.innerHTML = '<div class="modal-error"><div style="font-weight: bold; margin-bottom: 0.5rem;">문서 내용을 찾을 수 없습니다</div><div style="font-size: 0.875rem; color: #6b7280;">경로: ' + doc.path + '</div></div>';
      }

      modal.classList.add('active');
    }

    function closeModal() {
      document.getElementById('docModal').classList.remove('active');
    }

    // ESC 키로 모달 닫기
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    // 모달 배경 클릭 시 닫기
    document.getElementById('docModal').addEventListener('click', function(e) {
      if (e.target.id === 'docModal') closeModal();
    });

    // 검색 기능
    document.getElementById('searchBox').addEventListener('input', function(e) {
      searchDocuments(e.target.value);
    });

    // 초기화
    init();
  </script>
</body>
</html>
