name: 문서 동기화 & 배포

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    # 매일 오전 9시 (KST) 자동 동기화
    - cron: '0 0 * * *'

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        
      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 문서 동기화
        run: |
          node sync-docs.js
          
      - name: 변경사항 확인
        id: check
        run: |
          git config user.name "ButterBot"
          git config user.email "bot@unbutter.co.kr"
          
          if [[ -n $(git status -s) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
          
      - name: 변경사항 커밋 & 푸시
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git add docs/
          git commit -m "📚 문서 자동 동기화: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
          
      - name: Vercel 배포
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          echo "✅ Vercel Git 연동으로 자동 배포됩니다"
